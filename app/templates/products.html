<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мониторинг цен</title>
    <link rel="stylesheet" href="{{ url_for('static', path='styles/style.css') }}">
</head>
<body>
    <div class="container">
        <h1>Список отслеживаемых товаров</h1>

        {% if products %}
            <div class="products-list">
                {% for product in products %}
                    <div class="product-card">
                        <h3>{{ product.name }}</h3>
                        <p>ID: {{ product.id }}</p>
                        <a href="/products/{{ product.id }}">Посмотреть историю цен</a>
                    </div>
                {% endfor %}
            </div>
        {% else %}
            <p>База данных пока пуста.</p>
        {% endif %}
    </div>
</body>
</html>
